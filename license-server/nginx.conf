# Nginx config for the license server.
# The `install.sh` script auto-generates this with your real domain.
# server_name is populated from the DOMAIN env var / install prompt.

server {
    listen 80;
    server_name license.stream-vault.eu;

    # ACME challenge for Let's Encrypt auto-renewal.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name license.stream-vault.eu;

    ssl_certificate     /etc/letsencrypt/live/license.stream-vault.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/license.stream-vault.eu/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 5m;

    # Stripe webhooks need the raw request body — disable buffering on this path.
    location /api/webhook/stripe {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

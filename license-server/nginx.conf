# Replace dramarosub.ro with your actual domain after you point DNS at the VPS.
# Run `certbot certonly --webroot -w /var/www/certbot -d dramarosub.ro -d www.dramarosub.ro`
# once before starting nginx in production.

server {
    listen 80;
    server_name dramarosub.ro www.dramarosub.ro;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name dramarosub.ro www.dramarosub.ro;

    ssl_certificate /etc/letsencrypt/live/dramarosub.ro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dramarosub.ro/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 5m;

    # Stripe webhook needs the raw body — no buffering tricks here.
    location /api/webhook/stripe {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

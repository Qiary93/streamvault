version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: dsb-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "127.0.0.1:27018:27017"   # 27018 host-side to avoid clashing with StreamVault on the same VPS
    networks: [dsb]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dsb-backend
    restart: unless-stopped
    env_file: .env
    environment:
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: ${DB_NAME:-stream_vault_license}
    depends_on: [mongo]
    expose: ["8000"]
    networks: [dsb]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_BACKEND_URL: ${FRONTEND_URL:-https://license.stream-vault.eu}
    container_name: dsb-frontend
    restart: unless-stopped
    expose: ["80"]
    networks: [dsb]

  nginx:
    image: nginx:1.27-alpine
    container_name: dsb-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on: [backend, frontend]
    networks: [dsb]

  certbot:
    image: certbot/certbot:latest
    container_name: dsb-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done'"

networks:
  dsb:
    driver: bridge

volumes:
  mongo-data:

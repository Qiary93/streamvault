name: streamvault

services:
  mongo:
    image: mongo:7
    container_name: sv-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
      - mongo-config:/data/configdb
    environment:
      MONGO_INITDB_DATABASE: ${DB_NAME:-streamvault}
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-svadmin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    # Expose ONLY to the server's loopback — reach it from your laptop via an
    # SSH tunnel in Navicat/MongoDB Compass. Never change this to 0.0.0.0.
    ports:
      - "127.0.0.1:27017:27017"
    networks:
      - sv-net
    healthcheck:
      test:
        - "CMD"
        - "mongosh"
        - "--quiet"
        - "-u"
        - "${MONGO_ROOT_USER:-svadmin}"
        - "-p"
        - "${MONGO_ROOT_PASSWORD}"
        - "--authenticationDatabase"
        - "admin"
        - "--eval"
        - "db.adminCommand('ping').ok"
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    image: streamvault-backend:latest
    container_name: sv-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URL: "mongodb://${MONGO_ROOT_USER:-svadmin}:${MONGO_ROOT_PASSWORD}@mongo:27017/?authSource=admin"
      DB_NAME: ${DB_NAME:-streamvault}
      CORS_ORIGINS: "https://${DOMAIN}"
      FRONTEND_URL: "https://${DOMAIN}"
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_DISPLAY_NAME: ${ADMIN_DISPLAY_NAME:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      STRIPE_API_KEY: ${STRIPE_API_KEY:-}
      STRIPE_CONNECT_WEBHOOK_SECRET: ${STRIPE_CONNECT_WEBHOOK_SECRET:-}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-}
      LIVEKIT_URL: ${LIVEKIT_URL:-}
      HOST_REPO_PATH: /host/repo
    volumes:
      # RW mount so the backend can run `git fetch` and signal update jobs to
      # the host-side systemd path watcher (.update-state/requested file).
      - ${PROJECT_DIR:-/opt/streamvault}:/host/repo
    networks:
      - sv-net

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
      args:
        REACT_APP_BACKEND_URL: "https://${DOMAIN}"
    image: streamvault-frontend:latest
    container_name: sv-frontend
    restart: unless-stopped
    networks:
      - sv-net

  nginx:
    image: nginx:1.27-alpine
    container_name: sv-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/streamvault.conf.template:/etc/nginx/templates/streamvault.conf.template:ro
      - ./nginx/ssl-params.conf:/etc/nginx/conf.d/ssl-params.conf:ro
      - letsencrypt:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    environment:
      DOMAIN: ${DOMAIN}
    # The nginx:alpine image supports envsubst via /etc/nginx/templates
    depends_on:
      - backend
      - frontend
    networks:
      - sv-net

  certbot:
    image: certbot/certbot:latest
    container_name: sv-certbot
    restart: unless-stopped
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    # Renew every 12h; reload nginx on success.
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet && nginx -s reload 2>/dev/null || true; sleep 12h & wait $${!}; done'"
    depends_on:
      - nginx
    networks:
      - sv-net

volumes:
  mongo-data:
  mongo-config:
  letsencrypt:
  certbot-webroot:

networks:
  sv-net:
    driver: bridge
